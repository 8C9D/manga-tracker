# Test profile — activated via @ActiveProfiles("test").
# Production application.properties and application-prod.properties are unchanged;
# this file only applies when the test profile is active.

# H2 in-memory database (used by @SpringBootTest; @DataJpaTest replaces with its own embedded H2)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Auth — dummy credentials so SecurityConfig can construct in tests
app.auth.username=testuser
app.auth.password=testpass

# Default user — dummy values so DataInitializer can run
app.default-user.name=Test User
app.default-user.phone=+10000000000

# Twilio — empty; tests either mock NotificationService or don't dispatch
twilio.account-sid=
twilio.auth-token=
twilio.from-number=
