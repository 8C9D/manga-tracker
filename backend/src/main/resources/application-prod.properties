# Production overrides — fail closed if required env vars are missing.
# Activate by setting SPRING_PROFILES_ACTIVE=prod (e.g. on Railway).
app.auth.username=${APP_AUTH_USERNAME}
app.auth.password=${APP_AUTH_PASSWORD}

# The Railway MySQL database was created by Hibernate ddl-auto=update before
# Flyway was introduced. baseline-on-migrate tells Flyway "if you find a
# non-empty schema without a flyway_schema_history table, record V1 as
# already-applied (do NOT run it) and pick up from V2 onward."
# Safe to leave on permanently — it's a no-op once the history table exists.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.baseline-description=existing schema created by Hibernate ddl-auto=update
