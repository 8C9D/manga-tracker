spring.application.name=manga-tracker

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/manga_tracker?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# Flyway owns the schema. Hibernate only validates that the entities match.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

server.port=${PORT:8080}

# Twilio SMS
twilio.account-sid=${TWILIO_ACCOUNT_SID}
twilio.auth-token=${TWILIO_AUTH_TOKEN}
twilio.from-number=${TWILIO_FROM_NUMBER}

notification.sms.max-retry-attempts=3

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# Default user — auto-subscribed to every manga that is added
app.default-user.name=${DEFAULT_USER_NAME:Arthur}
app.default-user.phone=${DEFAULT_USER_PHONE}

# HTTP Basic auth — DEV DEFAULTS ONLY. Production overrides in application-prod.properties.
app.auth.username=${APP_AUTH_USERNAME:dev}
app.auth.password=${APP_AUTH_PASSWORD:local-dev-only}

# MangaDex client — timeouts, outbound concurrency, and retry policy.
mangadex.base-url=https://api.mangadex.org
mangadex.connect-timeout=5s
mangadex.read-timeout=10s
mangadex.max-concurrent-requests=3
mangadex.max-attempts=3
mangadex.initial-backoff=250ms
mangadex.max-backoff=1s

# Actuator — expose only health (with K8s/Railway-style liveness & readiness probes).
# All other endpoints (env, beans, configprops, loggers, ...) stay disabled.
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
management.endpoint.health.show-components=never

# Log pattern surfaces the per-request correlation id from MDC (set by RequestIdFilter).
logging.pattern.level=%5p [${spring.application.name:},%X{requestId:-}]
