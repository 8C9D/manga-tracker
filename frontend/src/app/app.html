<div class="container">
  <h1>Manga Tracker</h1>

  <form class="add-form" (ngSubmit)="addManga()">
    <input
      type="text"
      [(ngModel)]="newTitle"
      name="title"
      placeholder="Enter manga title..."
      required
    />
    <button type="submit">Add</button>
  </form>

  <p class="error" *ngIf="errorMessage()">{{ errorMessage() }}</p>

  <div class="list-header" *ngIf="sortedMangaList().length > 0">
    <button class="check-all-btn" (click)="checkAll()" [disabled]="checkingAll()">
      {{ checkingAll() ? 'Checking...' : 'Check all' }}
    </button>
    <button class="remove-all-btn" (click)="removeAll()" [disabled]="removingAll()">
      {{ removingAll() ? 'Removing...' : 'Remove all' }}
    </button>
  </div>

  <ul class="manga-list" *ngIf="sortedMangaList().length > 0; else empty">
    <li *ngFor="let manga of sortedMangaList()">
      <img *ngIf="manga.coverUrl" [src]="manga.coverUrl" [alt]="manga.title" class="manga-cover" referrerpolicy="no-referrer" />
      <div class="manga-info">
        <span class="manga-title">{{ manga.title }}</span>
        <div class="manga-meta">
          <span *ngIf="manga.latestChapter; else noChapter">Ch. {{ manga.latestChapter }}</span>
          <ng-template #noChapter><span class="pending">No chapter yet</span></ng-template>
          <span class="separator">·</span>
          <span *ngIf="manga.nextCheckDate; else noCheck">Next check: {{ daysUntil(manga.nextCheckDate) }}</span>
          <ng-template #noCheck><span class="pending">Check pending</span></ng-template>
          <ng-container *ngIf="chaptersBehind(manga.latestChapter, manga.lastReadChapter) as behind">
            <span class="separator">·</span>
            <span class="behind">{{ behind }} chapter{{ behind === 1 ? '' : 's' }} behind</span>
          </ng-container>
        </div>
      </div>
      <div class="manga-actions">
        <button class="check-btn" (click)="checkNow(manga.id)" [disabled]="checkingId() === manga.id">
          {{ checkingId() === manga.id ? 'Checking...' : 'Check now' }}
        </button>
        <button class="mark-read-btn" (click)="markRead(manga)"
          [disabled]="!manga.latestChapter || markingReadId() === manga.id || manga.lastReadChapter === manga.latestChapter">
          {{ markingReadId() === manga.id ? 'Saving...' : 'Mark read' }}
        </button>
        <button class="remove-btn" (click)="removeManga(manga.id)">Remove</button>
      </div>
    </li>
  </ul>

  <ng-template #empty>
    <p class="empty">No manga tracked yet. Add one above!</p>
  </ng-template>
</div>
