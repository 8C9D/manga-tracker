@if (auth.isAuthenticated()) {
<div class="container">
  <div class="app-header">
    <h1>Manga Tracker</h1>
    <button class="logout-btn" (click)="logout()">Sign out</button>
  </div>

  <form class="add-form" (ngSubmit)="addManga()">
    <input
      type="text"
      [(ngModel)]="newTitle"
      name="title"
      placeholder="Enter manga title..."
      required
    />
    <button type="submit" [disabled]="isSearching()">
      {{ isSearching() ? 'Searching...' : 'Search' }}
    </button>
  </form>

  <div class="search-results" *ngIf="searchResults().length > 0">
    <div class="search-results-header">
      <span class="search-results-label">Select a manga to add:</span>
      <button class="cancel-search-btn" (click)="cancelSearch()">Cancel</button>
    </div>
    <ul class="search-result-list">
      <li *ngFor="let result of searchResults()" class="search-result-item">
        <img *ngIf="result.coverUrl" [src]="result.coverUrl" [alt]="result.title" class="search-result-cover" referrerpolicy="no-referrer" />
        <span class="search-result-title">{{ result.title }}</span>
        <button class="add-result-btn" (click)="confirmAdd(result)">Add</button>
      </li>
    </ul>
  </div>

  <div class="add-anyway" *ngIf="showAddAnyway()">
    <button class="add-anyway-btn" (click)="addNoSource()">Add without MangaDex</button>
  </div>

  <p class="error" *ngIf="errorMessage()">{{ errorMessage() }}</p>

  <app-manga-list
    [mangaList]="sortedMangaList()"
    [sortBy]="sortBy()"
    [checkingId]="checkingId()"
    [markingReadId]="markingReadId()"
    [checkingAll]="checkingAll()"
    [removingAll]="removingAll()"
    (sortByChange)="sortBy.set($event)"
    (checkAll)="checkAll()"
    (removeAll)="removeAll()"
    (checkNow)="checkNow($event)"
    (markRead)="markRead($event)"
    (remove)="removeManga($event)" />
</div>
} @else {
  <app-login />
}
