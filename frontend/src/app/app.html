@if (auth.isAuthenticated()) {
<div class="container">
  <div class="app-header">
    <h1>Manga Tracker</h1>
    <button class="logout-btn" (click)="logout()">Sign out</button>
  </div>

  <app-manga-search-add
    [(newTitle)]="newTitle"
    [isSearching]="isSearching()"
    [searchResults]="searchResults()"
    [showAddAnyway]="showAddAnyway()"
    (search)="addManga()"
    (confirmAdd)="confirmAdd($event)"
    (addNoSource)="addNoSource()"
    (cancel)="cancelSearch()" />

  <p class="error" *ngIf="errorMessage()">{{ errorMessage() }}</p>

  <app-manga-list
    [mangaList]="sortedMangaList()"
    [sortBy]="sortBy()"
    [checkingId]="checkingId()"
    [markingReadId]="markingReadId()"
    [checkingAll]="checkingAll()"
    [removingAll]="removingAll()"
    (sortByChange)="sortBy.set($event)"
    (checkAll)="checkAll()"
    (removeAll)="removeAll()"
    (checkNow)="checkNow($event)"
    (markRead)="markRead($event)"
    (remove)="removeManga($event)" />
</div>
} @else {
  <app-login />
}
